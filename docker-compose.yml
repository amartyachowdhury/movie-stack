version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: movie-stack-backend
    ports:
      - "5001:5000"
    environment:
      - FLASK_ENV=development
      - DATABASE_URL=postgresql://postgres:password@db:5432/movie_stack
      - TMDB_API_KEY=${TMDB_API_KEY}
    volumes:
      - ./app:/app/app
      - ./instance:/app/instance
    depends_on:
      - db
    networks:
      - movie-stack-network
    restart: unless-stopped

  # Frontend React App
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: movie-stack-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - movie-stack-network
    restart: unless-stopped

  # PostgreSQL Database
  db:
    image: postgres:13-alpine
    container_name: movie-stack-db
    environment:
      - POSTGRES_DB=movie_stack
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - movie-stack-network
    restart: unless-stopped

  # Redis for caching (optional, for future use)
  redis:
    image: redis:6-alpine
    container_name: movie-stack-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - movie-stack-network
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: movie-stack-nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - movie-stack-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  movie-stack-network:
    driver: bridge
