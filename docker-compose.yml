version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: movie-stack-backend
    ports:
      - "5001:5000"
    environment:
      - FLASK_ENV=development
      - DATABASE_URL=postgresql://postgres:password@db:5432/movie_stack
      - TMDB_API_KEY=${TMDB_API_KEY}
    volumes:
      - ./app:/app/app
      - ./instance:/app/instance
    depends_on:
      - db
    networks:
      - movie-stack-network
    restart: unless-stopped

  # Frontend React App
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: movie-stack-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - movie-stack-network
    restart: unless-stopped

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: movie-stack-db
    environment:
      - MYSQL_DATABASE=movie_stack
      - MYSQL_USER=movie_user
      - MYSQL_PASSWORD=password
      - MYSQL_ROOT_PASSWORD=rootpassword
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    networks:
      - movie-stack-network
    restart: unless-stopped

  # Redis for caching (optional, for future use)
  redis:
    image: redis:6-alpine
    container_name: movie-stack-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - movie-stack-network
    restart: unless-stopped

  # Nginx Reverse Proxy (commented out for now)
  # nginx:
  #   image: nginx:alpine
  #   container_name: movie-stack-nginx
  #   ports:
  #     - "80:80"
  #   volumes:
  #     - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
  #   depends_on:
  #     - frontend
  #     - backend
  #   networks:
  #     - movie-stack-network
  #   restart: unless-stopped

volumes:
  mysql_data:
  redis_data:

networks:
  movie-stack-network:
    driver: bridge
