

services:
  # Backend API
  backend:
    build:
      context: ../..
      dockerfile: docker/backend/Dockerfile
    container_name: movie-stack-backend
    ports:
      - "5001:5000"
    env_file:
      - env.example
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=mysql://movie_user:password@db:3306/movie_stack
      - TMDB_API_KEY=${TMDB_API_KEY}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - movie-stack-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend React App
  frontend:
    build:
      context: ../..
      dockerfile: docker/frontend/Dockerfile
    container_name: movie-stack-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - movie-stack-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: movie-stack-db
    environment:
      - MYSQL_DATABASE=movie_stack
      - MYSQL_USER=movie_user
      - MYSQL_PASSWORD=password
      - MYSQL_ROOT_PASSWORD=rootpassword
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3308:3306"
    networks:
      - movie-stack-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Redis for caching
  redis:
    image: redis:6-alpine
    container_name: movie-stack-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - movie-stack-network
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:

networks:
  movie-stack-network:
    driver: bridge
