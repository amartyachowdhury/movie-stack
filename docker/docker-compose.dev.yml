version: '3.8'

services:
  # Backend API (Development)
  backend:
    build:
      context: ../..
      dockerfile: docker/backend/Dockerfile
    container_name: movie-stack-backend-dev
    ports:
      - "5001:5000"
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
      - DATABASE_URL=mysql://movie_user:password@db:3306/movie_stack
      - TMDB_API_KEY=${TMDB_API_KEY}
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ../../backend:/app
      - ../../instance:/app/instance
    depends_on:
      - db
      - redis
    networks:
      - movie-stack-network
    restart: unless-stopped
    command: ["python", "-m", "flask", "run", "--host=0.0.0.0", "--port=5000", "--reload"]

  # Frontend React App (Development)
  frontend:
    image: node:18-alpine
    container_name: movie-stack-frontend-dev
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ../../frontend:/app
      - /app/node_modules
    environment:
      - REACT_APP_API_URL=http://localhost:5001
    depends_on:
      - backend
    networks:
      - movie-stack-network
    restart: unless-stopped
    command: ["npm", "start"]

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: movie-stack-db-dev
    environment:
      - MYSQL_DATABASE=movie_stack
      - MYSQL_USER=movie_user
      - MYSQL_PASSWORD=password
      - MYSQL_ROOT_PASSWORD=rootpassword
    volumes:
      - mysql_data_dev:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3308:3306"
    networks:
      - movie-stack-network
    restart: unless-stopped

  # Redis for caching
  redis:
    image: redis:6-alpine
    container_name: movie-stack-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data
    networks:
      - movie-stack-network
    restart: unless-stopped

volumes:
  mysql_data_dev:
  redis_data_dev:

networks:
  movie-stack-network:
    driver: bridge
