<svg width="300" height="450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.7" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="300" height="450" fill="url(#bgGradient)"/>
  
  <!-- Movie icon -->
  <g transform="translate(150, 200)">
    <!-- Film strip -->
    <rect x="-60" y="-40" width="120" height="80" rx="8" fill="url(#iconGradient)" opacity="0.9"/>
    
    <!-- Film holes -->
    <circle cx="-45" cy="-25" r="3" fill="#667eea"/>
    <circle cx="-45" cy="25" r="3" fill="#667eea"/>
    <circle cx="45" cy="-25" r="3" fill="#667eea"/>
    <circle cx="45" cy="25" r="3" fill="#667eea"/>
    
    <!-- Play button -->
    <circle cx="0" cy="0" r="20" fill="#667eea"/>
    <polygon points="-5,-8 -5,8 8,0" fill="white"/>
  </g>
  
  <!-- Text -->
  <text x="150" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="white">No Poster Available</text>
  <text x="150" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="rgba(255,255,255,0.8)">Movie information still available</text>
  
  <!-- Decorative elements -->
  <circle cx="50" cy="100" r="2" fill="white" opacity="0.3"/>
  <circle cx="250" cy="150" r="1.5" fill="white" opacity="0.3"/>
  <circle cx="80" cy="350" r="1" fill="white" opacity="0.3"/>
  <circle cx="220" cy="320" r="1.5" fill="white" opacity="0.3"/>
</svg>
